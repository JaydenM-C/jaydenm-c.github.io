research_profile: |
  I am a quantitative historical linguist investigating how language structures change over
  deep time, and what their evolution reveals about cultural evolution and human cognition.
  I employ a primarily Bayesian toolkit: phylogenetic tree inference, phylogenetic
  comparative methods, ancestral state reconstruction, and phylogeographic regression.
  My PhD and subsequent published works develop phylogenetic methods for phonology,
  particularly phonotactics, with a regional focus on languages of Australia. In parallel,
  I work on the evolution of conceptual categories (nominal classification, case semantics,
  number), with work extending to broader Sahul (Australia and New Guinea), Tibeto-Burman,
  and worldwide language samples. Most recently, I have turned attention to the design of
  agentic LLM pipelines for large-scale extraction of linguistic data from published grammars.

skills:
  - label: "Statistical methods"
    text: >
      Bayesian inference and multilevel modelling (brms), Bayesian phylogenetic tree inference
      (BEAST), phylogenetic comparative methods, ancestral state reconstruction,
      phylogeographic regression (BayesTraits, R).
  - label: "Programming"
    text: >
      R (highly proficient, including the tidyverse, Bioconductor suite, phylogenetic packages
      [ape, phytools], geospatial packages [sf]), Python, Javascript, LaTeX.
  - label: "Research automation"
    text: >
      Design of agentic LLM pipelines for large-scale extraction of linguistic data (e.g.
      interlinear glossed text) from published grammars. The agent consults structured
      knowledge bases (IGT conventions, IPA, observations accumulated from prior grammars),
      then iteratively drafts, self-critiques, and refines its output while recording
      grammar-specific idiosyncrasies for later use. A prototype pipeline benchmarked against
      manual annotation on an Australian grammar sample achieved 99% precision, 99% recall.
  - label: "Data visualisation"
    text: "ggplot2, ggmap, ggtree. Interactive apps and mapping (Shiny, leaflet)."
  - label: "Open science"
    text: >
      Git (https://github.com/JaydenM-C), Zenodo/OSF (e.g. https://zenodo.org/records/7257104).
      Reproducibility tools (renv, Docker).

